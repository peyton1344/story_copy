<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เว็บกด Copy ทีละตอน</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f7fb;
      color: #172033;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 14px;
      background: rgba(244, 247, 251, 0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #dbe4f0;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .sub {
      margin: 0;
      font-size: 13px;
      color: #5b667a;
      line-height: 1.45;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #dbe4f0;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(20, 30, 55, 0.06);
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 15px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      border: 1px solid #cbd7e7;
      border-radius: 14px;
      padding: 12px;
      font-size: 16px;
      line-height: 1.6;
      outline: none;
      background: #fbfdff;
      color: #172033;
    }

    textarea:focus,
    input:focus {
      border-color: #5b8cff;
      box-shadow: 0 0 0 3px rgba(91, 140, 255, 0.15);
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 10px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: #1f6fff;
      color: #ffffff;
      min-height: 44px;
    }

    button.secondary {
      background: #eaf1ff;
      color: #1958c8;
    }

    button.danger {
      background: #ffe9e9;
      color: #b42323;
    }

    button.gray {
      background: #edf1f7;
      color: #2e3a4f;
    }

    button:active {
      transform: scale(0.98);
    }

    .mini {
      font-size: 12px;
      color: #6a7486;
      margin-top: 8px;
      line-height: 1.45;
    }

    input {
      width: 100%;
      border: 1px solid #cbd7e7;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 15px;
      background: #ffffff;
      color: #172033;
      min-height: 44px;
    }

    .count {
      color: #5b667a;
      font-size: 13px;
      margin: 8px 0 0;
    }

    .episode {
      background: #ffffff;
      border: 1px solid #dbe4f0;
      border-radius: 18px;
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(20, 30, 55, 0.05);
    }

    .episode.copied {
      border-color: #1f6fff;
      box-shadow: 0 8px 26px rgba(31, 111, 255, 0.18);
    }

    .episode-head {
      padding: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: #f9fbff;
      border-bottom: 1px solid #e5edf7;
    }

    .episode-title {
      font-weight: 800;
      line-height: 1.35;
      flex: 1;
      min-width: 180px;
    }

    .episode-body {
      padding: 13px;
      white-space: pre-wrap;
      line-height: 1.75;
      font-size: 16px;
      max-height: 360px;
      overflow: auto;
    }

    .episode-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-btn {
      padding: 9px 11px;
      font-size: 14px;
      min-height: 40px;
      border-radius: 11px;
    }

    .hidden {
      display: none;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: #14213d;
      color: #ffffff;
      padding: 11px 14px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
      z-index: 100;
      max-width: calc(100vw - 28px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      bottom: 26px;
    }

    .empty {
      text-align: center;
      color: #6a7486;
      padding: 28px 10px;
      border: 1px dashed #cbd7e7;
      border-radius: 18px;
      background: #ffffff;
    }

    @media (min-width: 720px) {
      h1 {
        font-size: 24px;
      }

      textarea {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>เว็บกด Copy ทีละตอน</h1>
    <p class="sub">วางข้อความทั้งหมด แล้วกด “สร้างรายการตอน” จากนั้นกด Copy ตอนที่ต้องการได้เลย</p>
  </header>

  <main>
    <section class="panel">
      <label for="rawText">วางเนื้อหาทั้งหมดตรงนี้</label>
      <textarea id="rawText" placeholder="ตัวอย่าง:

ตอน: ลิเมียเริ่มเดินเกมฟื้น...
เนื้อหาตอนที่ 1...

ตอน: คุซึโนะฮะสะสมมาคิก...
เนื้อหาตอนที่ 2...

ตอนพิเศษ: การตั้งรากฐาน...
เนื้อหาตอนพิเศษ..."></textarea>

      <div class="row">
        <button id="buildBtn">สร้างรายการตอน</button>
        <button id="saveBtn" class="secondary">บันทึกไว้ในเครื่อง</button>
        <button id="goLastCopiedBtn" class="secondary">ไปตอนที่คัดลอกล่าสุด</button>
        <button id="copyAllBtn" class="gray">Copy ทั้งหมด</button>
        <button id="clearBtn" class="danger">ล้างทั้งหมด</button>
      </div>

      <p class="mini">
        วิธีแยกตอน: ให้หัวข้อตอนขึ้นต้นด้วยคำว่า <b>ตอน:</b>, <b>ตอนที่ 1</b> หรือ <b>ตอนพิเศษ:</b>
      </p>
    </section>

    <section class="panel">
      <input id="searchBox" type="search" placeholder="ค้นหาชื่อตอนหรือเนื้อหา..." />
      <p id="countText" class="count">ยังไม่มีตอน</p>
      <p id="lastCopiedText" class="count">ยังไม่มีตอนที่คัดลอกล่าสุด</p>
    </section>

    <section id="episodes"></section>
  </main>

  <div id="toast" class="toast">คัดลอกแล้ว</div>

  <script>
    const rawText = document.getElementById("rawText");
    const buildBtn = document.getElementById("buildBtn");
    const saveBtn = document.getElementById("saveBtn");
    const copyAllBtn = document.getElementById("copyAllBtn");
    const clearBtn = document.getElementById("clearBtn");
    const goLastCopiedBtn = document.getElementById("goLastCopiedBtn");
    const searchBox = document.getElementById("searchBox");
    const episodesWrap = document.getElementById("episodes");
    const countText = document.getElementById("countText");
    const lastCopiedText = document.getElementById("lastCopiedText");
    const toast = document.getElementById("toast");

    const STORAGE_TEXT = "novel_copy_raw_text_v2";
    const STORAGE_LAST_COPIED = "novel_copy_last_copied_v2";

    let episodes = [];

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1600);
    }

    async function copyText(text, index = null) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
      }

      if (index !== null) {
        localStorage.setItem(STORAGE_LAST_COPIED, String(index));
        updateLastCopiedText();
        highlightCopied(index);
      }

      showToast("คัดลอกแล้ว");
    }

    function parseEpisodes(text) {
      const normalized = text.replace(/\r\n/g, "\n").trim();
      if (!normalized) return [];

      const lines = normalized.split("\n");
      const result = [];
      let currentTitle = "";
      let currentBody = [];

      const titlePattern = /^(ตอน(?:พิเศษ)?\s*[:：].+|ตอนที่\s*\d+.+)$/i;

      for (const line of lines) {
        const cleanLine = line.trim();

        if (titlePattern.test(cleanLine)) {
          if (currentTitle || currentBody.length) {
            result.push({
              title: currentTitle || "ตอนที่ " + (result.length + 1),
              body: currentBody.join("\n").trim()
            });
          }

          currentTitle = cleanLine;
          currentBody = [];
        } else {
          currentBody.push(line);
        }
      }

      if (currentTitle || currentBody.length) {
        result.push({
          title: currentTitle || "ตอนที่ " + (result.length + 1),
          body: currentBody.join("\n").trim()
        });
      }

      if (result.length === 0 && normalized) {
        result.push({
          title: "ตอนที่ 1",
          body: normalized
        });
      }

      return result.filter(ep => ep.title.trim() || ep.body.trim());
    }

    function renderEpisodes() {
      const query = searchBox.value.trim().toLowerCase();
      episodesWrap.innerHTML = "";

      const filtered = episodes
        .map((ep, index) => ({ ...ep, index }))
        .filter(ep => {
          const text = (ep.title + "\n" + ep.body).toLowerCase();
          return !query || text.includes(query);
        });

      countText.textContent = episodes.length
        ? "ทั้งหมด " + episodes.length + " ตอน | กำลังแสดง " + filtered.length + " ตอน"
        : "ยังไม่มีตอน";

      updateLastCopiedText();

      if (!filtered.length) {
        episodesWrap.innerHTML = '<div class="empty">ไม่เจอตอนที่ค้นหา หรือยังไม่ได้สร้างรายการตอน</div>';
        return;
      }

      filtered.forEach(ep => {
        const card = document.createElement("article");
        card.className = "episode";
        card.id = "episode-" + ep.index;

        const lastCopied = Number(localStorage.getItem(STORAGE_LAST_COPIED));
        if (lastCopied === ep.index) {
          card.classList.add("copied");
        }

        const fullText = ep.title + "\n\n" + ep.body;

        const head = document.createElement("div");
        head.className = "episode-head";

        const title = document.createElement("div");
        title.className = "episode-title";
        title.textContent = ep.title;

        const actions = document.createElement("div");
        actions.className = "episode-actions";

        const copyBtn = document.createElement("button");
        copyBtn.className = "small-btn";
        copyBtn.textContent = "Copy ตอนนี้";
        copyBtn.onclick = () => copyText(fullText, ep.index);

        const collapseBtn = document.createElement("button");
        collapseBtn.className = "small-btn gray";
        collapseBtn.textContent = "ซ่อน/แสดง";
        collapseBtn.onclick = () => body.classList.toggle("hidden");

        actions.appendChild(copyBtn);
        actions.appendChild(collapseBtn);

        head.appendChild(title);
        head.appendChild(actions);

        const body = document.createElement("div");
        body.className = "episode-body";
        body.textContent = ep.body || "(ไม่มีเนื้อหา)";

        card.appendChild(head);
        card.appendChild(body);
        episodesWrap.appendChild(card);
      });
    }

    function buildEpisodes() {
      episodes = parseEpisodes(rawText.value);
      localStorage.setItem(STORAGE_TEXT, rawText.value);
      renderEpisodes();
      showToast("สร้างรายการตอนแล้ว");
    }

    function saveText() {
      localStorage.setItem(STORAGE_TEXT, rawText.value);
      showToast("บันทึกไว้ในเครื่องแล้ว");
    }

    function clearAll() {
      const ok = confirm("ล้างข้อความและตอนทั้งหมดใช่ไหม?");
      if (!ok) return;

      rawText.value = "";
      episodes = [];
      localStorage.removeItem(STORAGE_TEXT);
      localStorage.removeItem(STORAGE_LAST_COPIED);
      renderEpisodes();
      showToast("ล้างแล้ว");
    }

    function copyAll() {
      const text = rawText.value.trim();
      if (!text) {
        showToast("ยังไม่มีข้อความให้คัดลอก");
        return;
      }
      copyText(text);
    }

    function updateLastCopiedText() {
      const lastCopied = Number(localStorage.getItem(STORAGE_LAST_COPIED));

      if (!Number.isInteger(lastCopied) || lastCopied < 0 || lastCopied >= episodes.length) {
        lastCopiedText.textContent = "ยังไม่มีตอนที่คัดลอกล่าสุด";
        return;
      }

      lastCopiedText.textContent = "คัดลอกล่าสุด: " + episodes[lastCopied].title;
    }

    function highlightCopied(index) {
      document.querySelectorAll(".episode").forEach(card => {
        card.classList.remove("copied");
      });

      const card = document.getElementById("episode-" + index);
      if (card) {
        card.classList.add("copied");
      }
    }

    function goLastCopied() {
      const lastCopied = Number(localStorage.getItem(STORAGE_LAST_COPIED));

      if (!Number.isInteger(lastCopied) || lastCopied < 0 || lastCopied >= episodes.length) {
        showToast("ยังไม่มีตอนที่คัดลอกล่าสุด");
        return;
      }

      searchBox.value = "";
      renderEpisodes();

      setTimeout(() => {
        const card = document.getElementById("episode-" + lastCopied);
        if (card) {
          card.scrollIntoView({ behavior: "smooth", block: "start" });
          card.classList.add("copied");
          showToast("ไปตอนที่คัดลอกล่าสุดแล้ว");
        }
      }, 50);
    }

    buildBtn.addEventListener("click", buildEpisodes);
    saveBtn.addEventListener("click", saveText);
    clearBtn.addEventListener("click", clearAll);
    copyAllBtn.addEventListener("click", copyAll);
    goLastCopiedBtn.addEventListener("click", goLastCopied);
    searchBox.addEventListener("input", renderEpisodes);

    window.addEventListener("beforeunload", () => {
      localStorage.setItem(STORAGE_TEXT, rawText.value);
    });

    const savedText = localStorage.getItem(STORAGE_TEXT);
    if (savedText) {
      rawText.value = savedText;
      episodes = parseEpisodes(savedText);
      renderEpisodes();
    } else {
      renderEpisodes();
    }
  </script>
</body>
</html>
